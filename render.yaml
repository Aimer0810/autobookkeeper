services:
  - type: web
    name: autobookkeeper
    env: docker
    plan: free
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: cloud
      - key: AUTOBOOKKEEPER_API_TOKEN
        sync: false
      - key: VISION_API_KEY
        sync: false
      - key: VISION_API_ENDPOINT
        value: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      - key: VISION_MODEL
        value: qwen3-vl-flash
      - key: AUTOBOOKKEEPER_AI_TIMEOUT_MS
        value: "30000"
      - key: DATABASE_URL
        fromDatabase:
          name: autobookkeeper-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: autobookkeeper-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: autobookkeeper-db
          property: password

databases:
  - name: autobookkeeper-db
    plan: free
