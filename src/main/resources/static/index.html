<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AutoBookkeeper</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f7fb; color: #172033; }
        header { padding: 24px 18px; background: linear-gradient(135deg, #1d4ed8, #06b6d4); color: white; }
        main { max-width: 960px; margin: 0 auto; padding: 18px; }
        .card { background: white; border-radius: 18px; box-shadow: 0 10px 30px rgba(15, 23, 42, .08); padding: 18px; margin-bottom: 16px; }
        input, select { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #d7dce8; border-radius: 12px; }
        button { margin-top: 10px; padding: 12px 16px; border: 0; border-radius: 12px; background: #1d4ed8; color: white; font-weight: 700; cursor: pointer; }
        button.secondary { background: #f97316; }
        button.danger { background: #dc2626; margin-left: 6px; }
        button.muted { background: #64748b; margin-left: 6px; }
        .row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; border-bottom: 1px solid #edf0f7; padding: 12px 0; }
        .merchant { font-weight: 700; }
        .meta { color: #64748b; font-size: 13px; margin-top: 4px; }
        .amount { font-weight: 800; color: #0f766e; }
        .amount.income { color: #047857; }
        .amount.expense { color: #dc2626; }
        .summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin: 10px 0 12px; }
        .summary-box { border-radius: 16px; background: #f8fafc; padding: 12px; }
        .summary-label { color: #64748b; font-size: 12px; font-weight: 700; }
        .summary-value { font-size: 22px; font-weight: 900; margin-top: 4px; }
        .summary-value.income { color: #047857; }
        .summary-value.expense { color: #dc2626; }
        .summary-value.balance { color: #1d4ed8; }
        .status { display: inline-block; padding: 3px 8px; border-radius: 999px; background: #eef2ff; color: #3730a3; font-size: 12px; }
        .status.review { background: #fff7ed; color: #c2410c; }
        .status.processed { background: #ecfdf5; color: #047857; }
        .actions { text-align: right; }
        .notice { padding: 10px 12px; border-radius: 12px; background: #fef2f2; color: #b91c1c; margin-bottom: 12px; display: none; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 10px; }
        .toolbar label { display: inline-flex; gap: 6px; align-items: center; color: #475569; font-size: 14px; font-weight: 700; }
        .toolbar input { width: auto; }
        .filter-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 12px; }
        .filter-grid label { font-size: 13px; color: #475569; font-weight: 700; }
        .filter-grid input, .filter-grid select { margin-top: 6px; }
        .quick-category { width: 120px; padding: 8px; margin: 0 0 8px 6px; }
        .summary-total { font-size: 32px; font-weight: 900; color: #0f766e; margin: 8px 0; }
        .summary-categories { display: flex; flex-wrap: wrap; gap: 8px; }
        .summary-chip { background: #f1f5f9; border-radius: 999px; padding: 6px 10px; color: #334155; font-size: 13px; }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, .45); display: none; align-items: center; justify-content: center; padding: 18px; }
        .modal { width: min(520px, 100%); background: white; border-radius: 18px; box-shadow: 0 24px 70px rgba(15, 23, 42, .24); padding: 18px; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .modal-grid label { font-size: 13px; color: #475569; font-weight: 700; }
        .modal-grid input, .modal-grid select { margin-top: 6px; width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #d7dce8; border-radius: 12px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
        .detail-block { margin-top: 12px; }
        .detail-block h3 { margin: 0 0 6px; font-size: 14px; color: #334155; }
        .detail-pre { max-height: 220px; overflow: auto; white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; border-radius: 12px; padding: 12px; font-size: 12px; line-height: 1.5; }
        .auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .auth-panel { background: #f8fafc; border-radius: 16px; padding: 12px; }
        .auth-panel h3 { margin: 0 0 10px; }
        .auth-panel label { display: block; margin-top: 8px; font-size: 13px; color: #475569; font-weight: 700; }
        .auth-panel input { margin-top: 6px; }
        .token-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .dashboard { display: none; }
        .auth-switch { margin-top: 12px; }
        .auth-switch a { color: #1d4ed8; cursor: pointer; font-weight: 700; }
        @media (max-width: 640px) {
            .row { grid-template-columns: 1fr; }
            .actions { text-align: left; }
            .modal-grid { grid-template-columns: 1fr; }
            .filter-grid { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: 1fr; }
            .auth-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <h1>AutoBookkeeper</h1>
    <p>智能截图记账助手账目看板</p>
</header>
<main>
    <section id="authCard" class="card">
        <h2 id="authTitle">登录</h2>
        <p id="accountStatus" class="meta">未登录</p>
        <div id="notice" class="notice"></div>
        <div id="loginPanel" class="auth-panel">
            <label>用户名
                <input id="loginUsername" type="text" autocomplete="username">
            </label>
            <label>密码
                <input id="loginPassword" type="password" autocomplete="current-password">
            </label>
            <button onclick="loginAccount()">登录</button>
            <p class="auth-switch meta">还没有账号？<a onclick="showRegister()">去注册</a></p>
        </div>
        <div id="registerPanel" class="auth-panel" style="display:none">
            <label>用户名
                <input id="registerUsername" type="text" autocomplete="username">
            </label>
            <label>密码
                <input id="registerPassword" type="password" autocomplete="new-password">
            </label>
            <label>邀请码
                <input id="registerInviteCode" type="password">
            </label>
            <button onclick="registerAccount()">注册并登录</button>
            <p class="auth-switch meta">已有账号？<a onclick="showLogin()">返回登录</a></p>
        </div>
        <details>
            <summary class="meta">已有 API Token / 旧版手动输入</summary>
            <label for="token">API Token</label>
            <input id="token" type="password" placeholder="输入 X-API-Token 后保存到本浏览器">
            <button onclick="saveToken()">保存并刷新</button>
        </details>
    </section>
    <section class="card dashboard">
        <h2>账号</h2>
        <p id="dashboardAccountStatus" class="meta"></p>
        <div class="token-actions">
            <button class="secondary" onclick="copyToken()">复制快捷指令 Token</button>
            <button class="muted" onclick="logoutAccount()">退出登录</button>
        </div>
        <details id="migrationPanel">
            <summary class="meta">把旧数据迁移到当前账号</summary>
            <label for="legacyToken">旧版 API Token</label>
            <input id="legacyToken" type="password" placeholder="输入你的旧 token">
            <button class="secondary" onclick="migrateLegacyData()">迁移旧数据</button>
        </details>
    </section>
    <section class="card dashboard">
        <h2>月份账目</h2>
        <div class="filter-grid">
            <label>月份
                <input id="monthFilter" type="month" onchange="loadDashboard()">
            </label>
            <label>搜索商户
                <input id="merchantSearch" type="search" placeholder="输入商户关键字" oninput="renderTransactions()">
            </label>
            <label>类型筛选
                <select id="typeFilter" onchange="updateCategoryFilterOptions(); renderTransactions()">
                    <option value="">全部类型</option>
                    <option value="支出">支出</option>
                    <option value="收入">收入</option>
                </select>
            </label>
            <label>分类筛选
                <select id="categoryFilter" onchange="renderTransactions()">
                    <option value="">全部分类</option>
                </select>
            </label>
        </div>
        <div id="summary">加载中...</div>
    </section>
    <section class="card dashboard">
        <h2>最近账目</h2>
        <div class="toolbar">
            <label>
                <input id="reviewOnly" type="checkbox" onchange="renderTransactions()">
                只看需复核
            </label>
        </div>
        <div id="transactions">加载中...</div>
    </section>
</main>
<div id="editorBackdrop" class="modal-backdrop">
    <div class="modal">
        <h2>编辑账目</h2>
        <div class="modal-grid">
            <label>日期
                <input id="editDate" type="date">
            </label>
            <label>金额
                <input id="editAmount" type="number" step="0.01" min="0">
            </label>
            <label>商户
                <input id="editMerchant" type="text">
            </label>
            <label>类型
                <select id="editType" onchange="updateEditCategoryOptions()">
                    <option value="支出">支出</option>
                    <option value="收入">收入</option>
                </select>
            </label>
            <label>分类
                <select id="editCategory">
                </select>
            </label>
            <label>状态
                <select id="editStatus">
                    <option value="PROCESSED">已处理</option>
                    <option value="NEEDS_REVIEW">需复核</option>
                    <option value="FAILED">失败</option>
                </select>
            </label>
        </div>
        <div class="modal-actions">
            <button class="muted" onclick="closeEditor()">取消</button>
            <button onclick="saveTransaction()">保存</button>
        </div>
    </div>
</div>
<div id="detailBackdrop" class="modal-backdrop">
    <div class="modal">
        <h2>AI 识别详情</h2>
        <div class="detail-block">
            <h3>原始文本</h3>
            <pre id="detailRawText" class="detail-pre"></pre>
        </div>
        <div class="detail-block">
            <h3>结构化 JSON</h3>
            <pre id="detailStructuredJson" class="detail-pre"></pre>
        </div>
        <div class="modal-actions">
            <button class="muted" onclick="closeDetails()">关闭</button>
        </div>
    </div>
</div>
<script>
    const tokenInput = document.getElementById('token');
    tokenInput.value = localStorage.getItem('autobookkeeper-token') || '';
    if (tokenInput.value && !localStorage.getItem('autobookkeeper-username')) {
        localStorage.removeItem('autobookkeeper-token');
        tokenInput.value = '';
    }
    updateAccountStatus();
    document.getElementById('monthFilter').value = currentMonth();
    const categoriesByType = {
        '支出': ['餐饮', '交通', '购物', '住房', '医疗', '娱乐', '生活缴费', '转账', '其他', '未分类'],
        '收入': ['工资', '奖金', '报销', '退款', '转账收入', '其他收入']
    };
    let editingTransactionId = null;
    let latestTransactions = [];

    function saveToken() {
        localStorage.setItem('autobookkeeper-token', tokenInput.value);
        localStorage.setItem('autobookkeeper-username', '手动 Token');
        updateAccountStatus();
        hideNotice();
        refreshVisibility();
    }

    function showRegister() {
        document.getElementById('authTitle').textContent = '注册';
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('registerPanel').style.display = '';
        hideNotice();
    }

    function showLogin() {
        document.getElementById('authTitle').textContent = '登录';
        document.getElementById('registerPanel').style.display = 'none';
        document.getElementById('loginPanel').style.display = '';
        hideNotice();
    }

    async function registerAccount() {
        await authenticate('/api/auth/register', {
            username: document.getElementById('registerUsername').value,
            password: document.getElementById('registerPassword').value,
            inviteCode: document.getElementById('registerInviteCode').value
        });
    }

    async function loginAccount() {
        await authenticate('/api/auth/login', {
            username: document.getElementById('loginUsername').value,
            password: document.getElementById('loginPassword').value
        });
    }

    async function authenticate(url, payload) {
        hideNotice();
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(response.status === 401 ? '用户名或密码错误。' : response.status === 403 ? '邀请码错误。' : response.status === 409 ? '用户名已存在。' : '账号操作失败。');
            const data = await response.json();
            localStorage.setItem('autobookkeeper-token', data.token);
            localStorage.setItem('autobookkeeper-username', data.username);
            tokenInput.value = data.token;
            updateAccountStatus();
            hideNotice();
            refreshVisibility();
        } catch (error) {
            showNotice(error.message);
        }
    }

    function logoutAccount() {
        localStorage.removeItem('autobookkeeper-token');
        localStorage.removeItem('autobookkeeper-username');
        tokenInput.value = '';
        updateAccountStatus();
        latestTransactions = [];
        document.getElementById('summary').innerHTML = '<p class="meta">请先登录。</p>';
        document.getElementById('transactions').innerHTML = '<p class="meta">请先登录。</p>';
        refreshVisibility();
    }

    async function copyToken() {
        const token = localStorage.getItem('autobookkeeper-token');
        if (!token) {
            showNotice('请先登录或保存 Token。');
            return;
        }
        await navigator.clipboard.writeText(token);
        showNotice('Token 已复制，可粘贴到 iPhone 快捷指令的 X-API-Token。');
    }

    function updateAccountStatus() {
        const username = localStorage.getItem('autobookkeeper-username');
        const token = localStorage.getItem('autobookkeeper-token');
        const status = username ? `已登录：${username}` : token ? '已保存 API Token' : '未登录';
        document.getElementById('accountStatus').textContent = status;
        document.getElementById('dashboardAccountStatus').textContent = status;
    }

    async function migrateLegacyData() {
        const token = localStorage.getItem('autobookkeeper-token');
        const legacyToken = document.getElementById('legacyToken').value;
        if (!token || !localStorage.getItem('autobookkeeper-username') || localStorage.getItem('autobookkeeper-username') === '手动 Token') {
            showNotice('请先用新账号登录，再迁移旧数据。');
            return;
        }
        try {
            const response = await fetch('/api/auth/migrate-legacy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-Token': token },
                body: JSON.stringify({ legacyToken })
            });
            if (!response.ok) throw new Error(response.status === 403 ? '旧 token 不正确，无法迁移。' : '迁移失败。');
            const data = await response.json();
            showNotice(`迁移完成：${data.migratedCount} 条旧账目已绑定到当前账号。`);
            loadDashboard();
        } catch (error) {
            showNotice(error.message);
        }
    }

    function refreshVisibility() {
        const token = localStorage.getItem('autobookkeeper-token');
        const username = localStorage.getItem('autobookkeeper-username');
        const authenticated = Boolean(token && username);
        document.getElementById('authCard').style.display = authenticated ? 'none' : '';
        document.querySelectorAll('.dashboard').forEach(element => {
            element.style.display = authenticated ? '' : 'none';
        });
        if (authenticated) {
            loadDashboard();
        }
    }

    function loadDashboard() {
        loadSummary();
        loadTransactions();
    }

    function currentMonth() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    }

    function selectedMonth() {
        return document.getElementById('monthFilter').value || currentMonth();
    }

    async function loadSummary() {
        const headers = {};
        const token = localStorage.getItem('autobookkeeper-token');
        if (token) headers['X-API-Token'] = token;
        const container = document.getElementById('summary');
        try {
            const response = await fetch(`/api/transactions/summary?month=${selectedMonth()}`, { headers });
            if (!response.ok) throw new Error(response.status === 401 ? 'Token 无效或未填写。' : '加载汇总失败。');
            const data = await response.json();
            const expenseChips = (data.expenseCategorySummaries || []).map(item => `<span class="summary-chip">支出 · ${escapeHtml(item.category)} ¥${item.amount}</span>`).join('');
            const incomeChips = (data.incomeCategorySummaries || []).map(item => `<span class="summary-chip">收入 · ${escapeHtml(item.category)} ¥${item.amount}</span>`).join('');
            const categoryChips = `${incomeChips}${expenseChips}`;
            container.innerHTML = `
                <div class="meta">${data.month}</div>
                <div class="summary-grid">
                    <div class="summary-box"><div class="summary-label">收入</div><div class="summary-value income">+¥${data.incomeTotal || 0}</div></div>
                    <div class="summary-box"><div class="summary-label">支出</div><div class="summary-value expense">-¥${data.expenseTotal || 0}</div></div>
                    <div class="summary-box"><div class="summary-label">结余</div><div class="summary-value balance">¥${data.balance || 0}</div></div>
                </div>
                <div class="summary-categories">${categoryChips || '<span class="meta">暂无分类账目</span>'}</div>
            `;
        } catch (error) {
            container.innerHTML = '<p class="meta">汇总加载失败。</p>';
            showNotice(error.message);
        }
    }

    async function loadTransactions() {
        const headers = {};
        const token = localStorage.getItem('autobookkeeper-token');
        if (token) headers['X-API-Token'] = token;
        const container = document.getElementById('transactions');
        hideNotice();
        try {
            const response = await fetch(`/api/transactions?month=${selectedMonth()}&page=0&size=100`, { headers });
            if (!response.ok) throw new Error(response.status === 401 ? 'Token 无效或未填写。' : '加载账目失败。');
            const data = await response.json();
            latestTransactions = data.content || [];
            renderTransactions();
        } catch (error) {
            container.innerHTML = '<p class="meta">加载失败，请检查后端服务和网络。</p>';
            showNotice(error.message);
        }
    }

    function renderTransactions() {
        const container = document.getElementById('transactions');
        const reviewOnly = document.getElementById('reviewOnly').checked;
        const merchantQuery = document.getElementById('merchantSearch').value.trim().toLowerCase();
        const type = document.getElementById('typeFilter').value;
        const category = document.getElementById('categoryFilter').value;
        const rows = latestTransactions.filter(item => {
            if (reviewOnly && item.status !== 'NEEDS_REVIEW') return false;
            if (type && item.type !== type) return false;
            if (category && item.category !== category) return false;
            if (merchantQuery && !String(item.merchant || '').toLowerCase().includes(merchantQuery)) return false;
            return true;
        });
        if (rows.length === 0) {
            container.innerHTML = reviewOnly ? '<p class="meta">暂无需复核账目。</p>' : '<p class="meta">暂无账目。请先通过 iPhone 快捷指令上传截图。</p>';
            return;
        }
        container.innerHTML = rows.map(item => {
            const type = item.type || '支出';
            const isIncome = type === '收入';
            const amountClass = isIncome ? 'income' : 'expense';
            const amountPrefix = isIncome ? '+' : '-';
            return `
                <div class="row">
                    <div>
                        <div class="merchant">${escapeHtml(item.merchant)}</div>
                        <div class="meta">${item.transactionDate || ''} · ${type} · ${escapeHtml(item.category)} · <span class="status ${statusClass(item.status)}">${statusLabel(item.status)}</span></div>
                    </div>
                    <div class="actions">
                        <div class="amount ${amountClass}">${amountPrefix}¥${item.amount}</div>
                        <select class="quick-category" onchange="quickUpdateCategory(${item.id}, this.value)">
                            ${categoryOptions(type, item.category)}
                        </select>
                        <button class="muted" onclick="editTransaction(${item.id})">编辑</button>
                        <button class="muted" onclick="showDetails(${item.id})">详情</button>
                        ${item.status === 'NEEDS_REVIEW' ? `<button class="secondary" onclick="markProcessed(${item.id})">标记已处理</button>` : ''}
                        <button class="danger" onclick="deleteTransaction(${item.id})">删除</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function markProcessed(id) {
        try {
            const token = localStorage.getItem('autobookkeeper-token');
            const item = await fetchTransaction(id, token);
            const response = await fetch(`/api/transactions/${id}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    ...(token ? {'X-API-Token': token} : {})
                },
                body: JSON.stringify({
                    transactionDate: item.transactionDate,
                    amount: item.amount,
                    merchant: item.merchant,
                    type: item.type || '支出',
                    category: item.category,
                    status: 'PROCESSED'
                })
            });
            if (!response.ok) {
                showNotice(response.status === 401 ? 'Token 无效或未填写。' : '标记失败，请稍后重试。');
                return;
            }
            loadDashboard();
        } catch (error) {
            showNotice(error.message);
        }
    }

    async function quickUpdateCategory(id, category) {
        try {
            const token = localStorage.getItem('autobookkeeper-token');
            const item = await fetchTransaction(id, token);
            const response = await fetch(`/api/transactions/${id}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    ...(token ? {'X-API-Token': token} : {})
                },
                body: JSON.stringify({
                    transactionDate: item.transactionDate,
                    amount: item.amount,
                    merchant: item.merchant,
                    type: item.type || '支出',
                    category,
                    status: item.status
                })
            });
            if (!response.ok) {
                showNotice(response.status === 401 ? 'Token 无效或未填写。' : '分类保存失败，请稍后重试。');
                return;
            }
            hideNotice();
            loadDashboard();
        } catch (error) {
            showNotice(error.message);
        }
    }

    async function editTransaction(id) {
        try {
            const token = localStorage.getItem('autobookkeeper-token');
            const item = await fetchTransaction(id, token);
            editingTransactionId = id;
            document.getElementById('editDate').value = item.transactionDate || '';
            document.getElementById('editAmount').value = item.amount || '';
            document.getElementById('editMerchant').value = item.merchant || '';
            document.getElementById('editType').value = item.type || '支出';
            updateEditCategoryOptions(item.category || '其他');
            document.getElementById('editStatus').value = item.status || 'NEEDS_REVIEW';
            document.getElementById('editorBackdrop').style.display = 'flex';
        } catch (error) {
            showNotice(error.message);
        }
    }

    function closeEditor() {
        editingTransactionId = null;
        document.getElementById('editorBackdrop').style.display = 'none';
    }

    async function showDetails(id) {
        try {
            const token = localStorage.getItem('autobookkeeper-token');
            const item = await fetchTransaction(id, token);
            document.getElementById('detailRawText').textContent = item.rawText || '无';
            document.getElementById('detailStructuredJson').textContent = formatJson(item.structuredJson);
            document.getElementById('detailBackdrop').style.display = 'flex';
        } catch (error) {
            showNotice(error.message);
        }
    }

    function closeDetails() {
        document.getElementById('detailBackdrop').style.display = 'none';
    }

    async function saveTransaction() {
        if (!editingTransactionId) return;
        const token = localStorage.getItem('autobookkeeper-token');
        try {
            const response = await fetch(`/api/transactions/${editingTransactionId}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    ...(token ? {'X-API-Token': token} : {})
                },
                body: JSON.stringify({
                    transactionDate: emptyToNull(document.getElementById('editDate').value),
                    amount: emptyToNull(document.getElementById('editAmount').value),
                    merchant: emptyToNull(document.getElementById('editMerchant').value),
                    type: emptyToNull(document.getElementById('editType').value),
                    category: emptyToNull(document.getElementById('editCategory').value),
                    status: emptyToNull(document.getElementById('editStatus').value)
                })
            });
            if (!response.ok) {
                showNotice(response.status === 401 ? 'Token 无效或未填写。' : '保存失败，请检查输入后重试。');
                return;
            }
            closeEditor();
            hideNotice();
            loadDashboard();
        } catch (error) {
            showNotice(error.message);
        }
    }

    async function deleteTransaction(id) {
        if (!confirm('确认删除这条账目吗？')) return;
        const token = localStorage.getItem('autobookkeeper-token');
        const response = await fetch(`/api/transactions/${id}`, {
            method: 'DELETE',
            headers: token ? {'X-API-Token': token} : {}
        });
        if (!response.ok) {
            showNotice(response.status === 401 ? 'Token 无效或未填写。' : '删除失败，请稍后重试。');
            return;
        }
        loadDashboard();
    }

    async function fetchTransaction(id, token) {
        const response = await fetch(`/api/transactions/${id}`, {
            headers: token ? {'X-API-Token': token} : {}
        });
        if (!response.ok) throw new Error('读取账目失败。');
        return response.json();
    }

    function statusLabel(status) {
        return status === 'NEEDS_REVIEW' ? '需复核' : status === 'PROCESSED' ? '已处理' : status;
    }

    function statusClass(status) {
        return status === 'NEEDS_REVIEW' ? 'review' : status === 'PROCESSED' ? 'processed' : '';
    }

    function showNotice(message) {
        const notice = document.getElementById('notice');
        notice.textContent = message;
        notice.style.display = 'block';
    }

    function hideNotice() {
        const notice = document.getElementById('notice');
        notice.textContent = '';
        notice.style.display = 'none';
    }

    function escapeHtml(value) {
        return String(value || '').replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    }

    function emptyToNull(value) {
        return value === '' ? null : value;
    }

    function formatJson(value) {
        if (!value) return '无';
        try {
            return JSON.stringify(JSON.parse(value), null, 2);
        } catch (error) {
            return value;
        }
    }

    function allCategories() {
        return [...categoriesByType['支出'], ...categoriesByType['收入']];
    }

    function categoryOptions(type, selected) {
        return (categoriesByType[type] || allCategories())
                .map(category => `<option value="${category}" ${category === selected ? 'selected' : ''}>${category}</option>`)
                .join('');
    }

    function updateCategoryFilterOptions() {
        const type = document.getElementById('typeFilter').value;
        const selected = document.getElementById('categoryFilter').value;
        document.getElementById('categoryFilter').innerHTML = `<option value="">全部分类</option>${categoryOptions(type, selected)}`;
    }

    function updateEditCategoryOptions(selected) {
        const type = document.getElementById('editType').value || '支出';
        const current = selected || document.getElementById('editCategory').value;
        document.getElementById('editCategory').innerHTML = categoryOptions(type, current);
    }

    updateCategoryFilterOptions();
    updateEditCategoryOptions();
    refreshVisibility();
</script>
</body>
</html>
